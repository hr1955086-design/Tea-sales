<!DOCTYPE html>
<html>
<head>
<title>Hamid Raza</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#2c3e50;
}

.card{
background:white;
padding:20px;
margin:10px 0;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#3498db;
color:white;
font-size:16px;
}

button:hover{
background:#2980b9;
}

</style>

</head>

<body>

<h1>Hamid Raza</h1>

<div class="card">
<h3>Total Customers</h3>
<p id="totalCustomers">0</p>
</div>

<div class="card">
<button onclick="goCustomers()">Customers</button>
<button onclick="goAdd()">Add Record</button>
<button onclick="goStatement()">Monthly Statement</button>
</div>

<script>

let customers = JSON.parse(localStorage.getItem("customers")) || [];

document.getElementById("totalCustomers").innerText = customers.length;

function goCustomers(){
window.location.href="customers.html";
}

function goAdd(){
window.location.href="add-record.html";
}

function goStatement(){
window.location.href="statement.html";
}

</script>

</body>
</html>
